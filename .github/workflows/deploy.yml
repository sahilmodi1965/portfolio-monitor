name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'holdings.csv'
      - 'src/**'
      - 'config.json'
      - 'public/index.html'
      - '.github/workflows/**'

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore sector cache
        uses: actions/cache@v4
        with:
          path: data/sectors-cache.json
          key: sectors-cache-${{ hashFiles('holdings.csv') }}
          restore-keys: sectors-cache-

      - name: Build dashboard
        run: npm run build

      - name: Save sector cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/sectors-cache.json
          key: sectors-cache-${{ hashFiles('holdings.csv') }}-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
